<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>being lovestruck | Contact</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=Sacramento&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">being lovestruck</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="writings.html">Writings</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="page-content">
        <section class="contact-section">
            <div class="contact-container glass-window">
                <h2 class="section-title">Let's Connect</h2>
                <p>Have a thought to share or a project in mind? Drop a message below.</p>
                <form id="contact-form" class="contact-form">
                    <div class="input-group">
                        <input type="text" id="name" required placeholder=" ">
                        <label for="name">Your Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">Your Email</label>
                    </div>
                    <div class="input-group">
                        <textarea id="message" required placeholder=" " rows="1"></textarea>
                        <label for="message">Your Message</label>
                    </div>
                    <button type="submit" class="submit-btn">
                        <span>Send Message</span>
                        <div class="liquid"></div>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> being lovestruck. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
